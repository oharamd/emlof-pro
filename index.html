<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>エムログPRO - 駅前ビルランチ検索</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=M+PLUS+Rounded+1c:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f3ee;--surface:#fff;--surface2:#f0ede6;
  --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.18);
  --text:#1a1814;--text2:#6b6560;--text3:#9c9690;
  --red:#c84b2f;--red-bg:#fdf0ed;
  --blue:#2a5fa5;--blue-bg:#edf2fb;
  --gold:#b8860b;--gold-bg:#fdf8e6;
  --green:#2d7a45;--green-bg:#edf7f0;
  --r:12px;--rs:8px;
}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.6}

/* HEADER */
.hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:0 1rem;display:flex;align-items:center;gap:0.75rem;height:52px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,0.06)}
.logo{display:flex;align-items:flex-end;gap:3px;white-space:nowrap}
.logo-badge{font-size:10px;background:var(--red);color:#fff;padding:1px 5px;border-radius:4px;font-weight:700;vertical-align:middle}
.hdr-search{flex:1;max-width:260px;display:flex;align-items:center;background:var(--bg);border:1px solid var(--border);border-radius:20px;padding:0 10px;gap:5px}
.hdr-search input{border:none;background:transparent;font-size:13px;font-family:inherit;color:var(--text);outline:none;flex:1;padding:6px 0}
.hdr-search input::placeholder{color:var(--text3)}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:6px}
.sync-badge{font-size:11px;color:var(--text3);white-space:nowrap}

/* NEWS */
.news{background:#1a1814;color:#fff;padding:7px 1rem;display:flex;align-items:center;gap:8px;overflow:hidden}
.news-tag{background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:2px 6px;border-radius:3px;white-space:nowrap}
.news-wrap{overflow:hidden;flex:1}
.news-txt{font-size:12px;color:rgba(255,255,255,0.85);white-space:nowrap;display:inline-block;animation:tick 30s linear infinite}
@keyframes tick{0%{transform:translateX(100vw)}100%{transform:translateX(-100%)}}

/* MAIN */
.main{max-width:1100px;margin:0 auto;padding:1rem 1rem 4rem}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1rem}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:0.625rem 0.75rem;text-align:center}
.stat-n{font-family:'M PLUS Rounded 1c',sans-serif;font-size:22px;font-weight:700;color:var(--red);line-height:1;margin-bottom:2px}
.stat-l{font-size:11px;color:var(--text3)}

/* CONTROLS */
.ctrl{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:0.75rem;margin-bottom:0.875rem}
.ctrl-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.ctrl-row+.ctrl-row{margin-top:6px;padding-top:6px;border-top:1px solid var(--border)}
.ctrl-lbl{font-size:11px;font-weight:500;color:var(--text3);white-space:nowrap;min-width:40px}
.chips{display:flex;gap:4px;flex-wrap:wrap;flex:1}
.chip{font-size:12px;padding:4px 10px;border-radius:16px;border:1px solid var(--border);background:var(--surface);color:var(--text2);cursor:pointer;transition:all .12s;white-space:nowrap;font-family:inherit}
.chip:hover{border-color:var(--border2);background:var(--bg)}
.chip.on{background:var(--red);color:#fff;border-color:var(--red)}
.chip.on.b{background:var(--blue);border-color:var(--blue)}
.ctrl-r{margin-left:auto;display:flex;gap:5px;align-items:center}
select.sel{font-size:12px;padding:4px 8px;border-radius:16px;border:1px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer;font-family:inherit;outline:none}
.vbtns{display:flex;gap:3px}
.vbtn{width:28px;height:28px;border-radius:var(--rs);border:1px solid var(--border);background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text3);transition:all .12s}
.vbtn.on{background:var(--text);color:#fff;border-color:var(--text)}

/* META */
.meta{display:flex;align-items:center;gap:6px;margin-bottom:0.625rem;font-size:12px;color:var(--text3)}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:10px}
.lst{display:flex;flex-direction:column}

/* CARD */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:0.875rem;cursor:pointer;transition:all .15s;position:relative;overflow:hidden}
.card:hover{border-color:var(--border2);box-shadow:0 4px 20px rgba(0,0,0,0.08);transform:translateY(-1px)}
.card.isnew{border-color:rgba(200,75,47,0.35)}
.card.isnew::before,.card.isw::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.card.isnew::before{background:var(--red)}
.card.isw::before{background:var(--gold)}
.bdg-row{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:6px;min-height:20px}
.bdg{font-size:10px;font-weight:700;padding:2px 6px;border-radius:3px;white-space:nowrap}
.bdg-new{background:var(--red-bg);color:var(--red)}
.bdg-w{background:var(--gold-bg);color:var(--gold)}
.bdg-ln{background:var(--green-bg);color:var(--green)}
.card-icon{font-size:20px;margin-bottom:3px}
.card-name{font-size:14px;font-weight:700;line-height:1.3;margin-bottom:3px}
.card-bld{font-size:11px;color:var(--text3);margin-bottom:5px}
.card-genre{display:inline-block;font-size:11px;padding:2px 7px;background:var(--surface2);color:var(--text2);border-radius:8px;margin-bottom:6px}
.card-bottom{display:flex;justify-content:space-between;align-items:flex-end;margin-top:4px}
.card-price{font-family:'M PLUS Rounded 1c',sans-serif;font-size:15px;font-weight:700}
.card-price span{font-size:11px;font-weight:400;color:var(--text3)}
.card-rating{display:flex;align-items:center;gap:2px;font-size:12px;color:var(--text2)}
.star{color:#f0a500;font-size:12px}
.card-dist{display:flex;align-items:center;gap:2px;font-size:11px;color:var(--text3);margin-top:4px}
.card-rec{margin-top:5px;font-size:11px;color:var(--text3);background:var(--bg);border-radius:var(--rs);padding:3px 7px;line-height:1.4}
/* ユーザー評価バー */
.user-rating-bar{display:flex;align-items:center;gap:4px;margin-top:5px}
.u-stars{display:flex;gap:1px}
.u-star{color:#ddd;font-size:13px;cursor:pointer;transition:color .1s}
.u-star.lit{color:#f0a500}
.u-count{font-size:10px;color:var(--text3)}

/* LIST ROW */
.lrow{background:var(--surface);border-bottom:1px solid var(--border);padding:0.75rem 0.875rem;display:flex;align-items:center;gap:10px;cursor:pointer;transition:background .1s}
.lrow:first-child{border-top:1px solid var(--border);border-radius:var(--r) var(--r) 0 0}
.lrow:last-child{border-radius:0 0 var(--r) var(--r)}
.lrow:only-child{border-radius:var(--r)}
.lrow:hover{background:var(--bg)}
.lrow-icon{width:38px;height:38px;background:var(--bg);border-radius:var(--rs);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;border:1px solid var(--border)}
.lrow-info{flex:1;min-width:0}
.lrow-name{font-size:14px;font-weight:700}
.lrow-sub{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:4px;flex-wrap:wrap}
.lrow-r{text-align:right;flex-shrink:0}
.lrow-price{font-weight:700;font-size:13px}
.lrow-dist{font-size:11px;color:var(--text3)}

/* EMPTY */
.empty{text-align:center;padding:3rem 1rem;color:var(--text3)}
.empty-ic{font-size:40px;margin-bottom:8px}

/* MODAL */
.moverlay{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.45);align-items:center;justify-content:center;padding:1rem}
.moverlay.open{display:flex}
.modal{background:var(--surface);border-radius:16px;width:100%;max-width:430px;max-height:92vh;overflow-y:auto;position:relative;box-shadow:0 20px 60px rgba(0,0,0,0.2)}
.mhdr{padding:1.125rem 1.125rem 0;position:sticky;top:0;background:var(--surface);z-index:1}
.mclose{position:absolute;top:10px;right:10px;width:26px;height:26px;border-radius:50%;background:var(--bg);border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--text2)}
.mbody{padding:0 1.125rem 1.125rem}
.mtitle{font-size:19px;font-weight:700;margin-bottom:2px}
.msub{font-size:12px;color:var(--text3);display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.mdiv{height:1px;background:var(--border);margin:12px 0}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.info-box{background:var(--bg);border-radius:var(--rs);padding:8px 10px}
.info-lbl{font-size:10px;color:var(--text3);font-weight:500;margin-bottom:2px;text-transform:uppercase;letter-spacing:.04em}
.info-val{font-size:14px;font-weight:700}
.sec-ttl{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px}
.menu-lst{background:var(--bg);border-radius:var(--rs);overflow:hidden;margin-bottom:12px}
.menu-row{display:flex;justify-content:space-between;align-items:center;padding:7px 10px;border-bottom:1px solid var(--border);font-size:13px}
.menu-row:last-child{border-bottom:none}
.menu-nm{color:var(--text);display:flex;align-items:center;gap:4px}
.menu-pr{font-weight:700;white-space:nowrap}
.hot{background:var(--red-bg);color:var(--red);font-size:10px;font-weight:700;padding:1px 4px;border-radius:3px}
.note-box{background:var(--blue-bg);border-left:3px solid var(--blue);border-radius:0 var(--rs) var(--rs) 0;padding:9px 11px;font-size:13px;color:var(--blue);margin-bottom:12px;line-height:1.6}
.map-box{height:160px;border-radius:var(--rs);overflow:hidden;margin-bottom:12px;border:1px solid var(--border);background:var(--bg)}
.map-box iframe{width:100%;height:100%;border:none}
.map-box.loading{display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:13px}
/* カード写真 */
.card-photo{width:100%;height:120px;object-fit:cover;border-radius:var(--rs) var(--rs) 0 0;margin-bottom:8px;background:var(--bg);display:block}
.card-photo-wrap{margin:-0.875rem -0.875rem 8px;overflow:hidden;border-radius:var(--r) var(--r) 0 0;height:120px;background:var(--bg)}
.card-photo-wrap img{width:100%;height:100%;object-fit:cover;display:block}
.mbtn{flex:1;padding:9px;border-radius:var(--rs);border:1px solid var(--border);background:var(--surface);font-size:13px;font-weight:500;font-family:inherit;cursor:pointer;color:var(--text);transition:all .12s;display:flex;align-items:center;justify-content:center;gap:4px}
.mbtn:hover{background:var(--bg)}
.mbtn.primary{background:var(--red);color:#fff;border-color:var(--red)}
.mbtn.primary:hover{background:#b03d24}

/* ユーザーレビューセクション */
.review-form{background:var(--bg);border-radius:var(--rs);padding:10px 12px;margin-bottom:10px;border:1px solid var(--border)}
.review-form-title{font-size:12px;font-weight:700;color:var(--text);margin-bottom:8px}
.star-select{display:flex;gap:4px;margin-bottom:8px}
.star-pick{font-size:22px;cursor:pointer;color:#ddd;transition:color .1s;line-height:1}
.star-pick.lit{color:#f0a500}
.review-name{width:100%;padding:6px 9px;border:1px solid var(--border);border-radius:var(--rs);font-size:12px;font-family:inherit;background:var(--surface);color:var(--text);outline:none;margin-bottom:6px}
.review-name:focus{border-color:var(--blue)}
.review-txt{width:100%;padding:6px 9px;border:1px solid var(--border);border-radius:var(--rs);font-size:12px;font-family:inherit;background:var(--surface);color:var(--text);outline:none;resize:vertical;min-height:60px;margin-bottom:6px}
.review-txt:focus{border-color:var(--blue)}
.review-submit{width:100%;padding:8px;border-radius:var(--rs);border:none;background:var(--red);color:#fff;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;transition:background .12s}
.review-submit:hover{background:#b03d24}
.review-item{background:var(--surface);border-radius:var(--rs);padding:9px 11px;border:1px solid var(--border);margin-bottom:6px}
.review-item-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.review-author{font-size:12px;font-weight:700;color:var(--text)}
.review-date{font-size:10px;color:var(--text3)}
.review-stars{color:#f0a500;font-size:12px}
.review-body{font-size:12px;color:var(--text2);line-height:1.6}

/* RESPONSIVE */
@media(max-width:640px){
  .stats{grid-template-columns:repeat(2,1fr)}
  .grid{grid-template-columns:1fr 1fr}
  .hdr-search{display:none}
  .ctrl-r{width:100%;justify-content:flex-end}
  .hdr{padding:0 0.75rem;gap:0.5rem}
  .logo{font-size:15px}
  .sync-badge{display:none}
}
@media(max-width:400px){.grid{grid-template-columns:1fr}}
</style>
</head>

        <button class="chip" data-v="洋食">🍽 洋食</button>
        <button class="chip" data-v="ハンバーガー">🍔 バーガー</button>

// ═══════════════════════════════════════
// USER REVIEWS（GASスプレッドシートで全員共有）
// ローカルキャッシュで高速表示、投稿はGASに送信
// ═══════════════════════════════════════
const REVIEW_CACHE = {}; // { shopId: { reviews, avg, count, loadedAt } }

// キャッシュから評価を取得（即時）
function getCachedRating(shopId) {
  const c = REVIEW_CACHE[shopId];
  return c ? c.avg : null;
}
function getCachedCount(shopId) {
  const c = REVIEW_CACHE[shopId];
  return c ? c.count : 0;
}

// GASからユーザー口コミを取得してキャッシュに保存
async function fetchUserReviews(shopId) {
  if (!GAS_URL) return { reviews:[], avg:null, count:0 };
  // 5分以内にロード済みならキャッシュを使う
  const c = REVIEW_CACHE[shopId];
  if (c && Date.now() - c.loadedAt < 5*60*1000) return c;
  try {
    const res  = await fetch(`${GAS_URL}?action=getUserReviews&shopId=${shopId}`);
    const data = await res.json();
    REVIEW_CACHE[shopId] = { ...data, loadedAt: Date.now() };
    return REVIEW_CACHE[shopId];
  } catch(e) {
    return { reviews:[], avg:null, count:0 };
  }
}

// GASに口コミを投稿（リダイレクト対応版）
async function postReviewToGAS(shopId, shopName, name, rating, comment) {
  if (!GAS_URL) return { success: false };
  const getUrl = `${GAS_URL}?action=postReview&shopId=${encodeURIComponent(shopId)}&shopName=${encodeURIComponent(shopName)}&name=${encodeURIComponent(name)}&rating=${rating}&comment=${encodeURIComponent(comment)}`;
  try {
    const res = await fetch(getUrl, { redirect: "follow" });
    const text = await res.text();
    // レスポンスがJSONかチェック
    try {
      return JSON.parse(text);
    } catch(_) {
      // HTMLが返ってきた場合（リダイレクト後）も成功とみなす
      return { success: true };
    }
  } catch(e) {
    // no-corsフォールバック
    try {
      await fetch(getUrl, { mode: "no-cors" });
      return { success: true };
    } catch(e2) {
      return { success: false };
    }
  }
}

document.addEventListener("DOMContentLoaded", ()=>{

  document.getElementById("bldChips").addEventListener("click", e=>{

    document.querySelectorAll("#bldChips .chip").forEach(x=>{x.classList.remove("on","b")});

  });
  document.getElementById("budgetSel").onchange = e=>{ S.budget=e.target.value; render(); };
  document.getElementById("sortSel").onchange = e=>{ S.sort=e.target.value; render(); };
  document.getElementById("searchInput").oninput = e=>{ S.search=e.target.value.trim(); render(); };
  document.getElementById("btnGrid").onclick = ()=>{ S.view="grid"; document.getElementById("btnGrid").classList.add("on"); document.getElementById("btnList").classList.remove("on"); render(); };
  document.getElementById("btnList").onclick = ()=>{ S.view="list"; document.getElementById("btnList").classList.add("on"); document.getElementById("btnGrid").classList.remove("on"); render(); };
  document.getElementById("moverlay").onclick = e=>{ if(e.target===e.currentTarget) closeModal(); };
  document.addEventListener("keydown", e=>{ if(e.key==="Escape") closeModal(); });
});

// ═══════════════════════════════════════
// FILTER + SORT
// ═══════════════════════════════════════
function filtered() {
  let list = [...SHOPS];
  if (S.genre!=="all") list = list.filter(s=>s.genre===S.genre);
  if (S.bld!=="all")   list = list.filter(s=>s.bld===S.bld);
  if (S.budget!=="all") list = list.filter(s=>s.price<=parseInt(S.budget));
  if (S.search) {
    const q=S.search.toLowerCase();
    list = list.filter(s=>s.name.toLowerCase().includes(q)||s.genre.toLowerCase().includes(q)||s.rec.toLowerCase().includes(q)||s.note.toLowerCase().includes(q));
  }
  const sorters = {
    rating: (a,b)=>b.rating-a.rating,
    user_rating: (a,b)=>(getUserRating(b.id)||0)-(getUserRating(a.id)||0),
    price_asc: (a,b)=>a.price-b.price,
    price_desc: (a,b)=>b.price-a.price,
    distance: (a,b)=>a.dist-b.dist,
    new: (a,b)=>(b.isNew?1:0)-(a.isNew?1:0),
  };
  list.sort(sorters[S.sort]||sorters.rating);
  return list;
}

// ═══════════════════════════════════════
// RENDER
// ═══════════════════════════════════════
function stars(r, size=12) {
  let h=""; const f=Math.floor(r);
  for(let i=0;i<f;i++) h+=`<span class="star" style="font-size:${size}px">★</span>`;
  if(r-f>=0.5) h+=`<span class="star" style="font-size:${size}px;opacity:.5">★</span>`;
  return h;
}
function walkMin(d){ return Math.max(1,Math.ceil(d/80)); }

function render() {
  const list = filtered();
  const worth = list.filter(s=>s.worth).length;
  document.getElementById("metaCount").textContent = list.length+"件";
  document.getElementById("metaWorth").innerHTML = worth>0 ? `<span style="color:var(--gold);margin-left:6px">★行く価値あり ${worth}件</span>` : "";

  const area = document.getElementById("shopArea");
  if(!list.length) {
    area.className=""; area.innerHTML=`<div class="empty"><div class="empty-ic">🔍</div><p>条件に合うお店が見つかりませんでした</p></div>`; return;
  }

  if(S.view==="grid") {
    area.className="grid";
    area.innerHTML = list.map(s=>{
      const ur = getCachedRating(s.id);
      const rc = getCachedCount(s.id);
      const photoHtml = s.photoUrl
        ? `<div class="card-photo-wrap"><img src="${s.photoUrl}" alt="${s.name}" loading="lazy" onerror="this.parentNode.style.display='none'"></div>`
        : "";
      return `<div class="card${s.isNew?" isnew":""}${s.worth?" isw":""}" onclick="openModal(${s.id})">
        ${photoHtml}
        <div class="bdg-row">
          ${s.isNew?'<span class="bdg bdg-new">NEW</span>':""}
          ${s.worth?'<span class="bdg bdg-w">★おすすめ</span>':""}
          <span class="bdg bdg-ln">ランチ</span>
        </div>
        <div class="card-icon">${s.icon}</div>
        <div class="card-name">${s.name}</div>
        <div class="card-bld">🏢 ${s.bld} ${s.fl}</div>
        <span class="card-genre">${s.genre}</span>
        <div class="card-bottom">
          <div class="card-price">〜¥${s.price.toLocaleString()} <span>/人</span></div>
          <div class="card-rating">${stars(s.rating)} ${s.rating.toFixed(1)}</div>
        </div>
        <div class="card-dist">🚶 徒歩約${walkMin(s.dist)}分</div>
        ${ur!==null?`<div class="user-rating-bar">${stars(ur,13)}<span class="u-count">みんなの評価 ${ur.toFixed(1)}（${rc}件）</span></div>`:""}
        <div class="card-rec">💬 ${s.rec}</div>
      </div>`;
    }).join("");
  } else {
    area.className="lst";
    area.innerHTML = list.map(s=>{
      const ur = getCachedRating(s.id);
      const rc = getCachedCount(s.id);
      return `<div class="lrow" onclick="openModal(${s.id})">
        <div class="lrow-icon">${s.icon}</div>
        <div class="lrow-info">
          <div class="lrow-name">${s.name}${s.isNew?' <span class="bdg bdg-new" style="font-size:9px">NEW</span>':""}</div>
          <div class="lrow-sub">${s.bld} ${s.fl} ・ ${s.genre} ・ ${stars(s.rating,11)} ${s.rating.toFixed(1)}${ur!==null?` ・ 👥${ur.toFixed(1)}(${rc}件)`:""}
          </div>
        </div>
        <div class="lrow-r">
          <div class="lrow-price">〜¥${s.price.toLocaleString()}</div>
          <div class="lrow-dist">🚶${walkMin(s.dist)}分</div>
        </div>
      </div>`;
    }).join("");
  }
}

function updateStats(shops) {
  document.getElementById("sTotal").textContent  = shops.length;
  document.getElementById("sNew").textContent    = shops.filter(s=>s.isNew).length;
  document.getElementById("sWorth").textContent  = shops.filter(s=>s.worth).length;
  document.getElementById("sUnder").textContent  = shops.filter(s=>s.price<=800).length;
}

// ═══════════════════════════════════════
// MODAL
// ═══════════════════════════════════════
let currentShopId = null;
let pickedRating = 0;

function openModal(id) {
  currentShopId = id; pickedRating = 0;
  const s = SHOPS.find(x=>x.id===id); if(!s) return;
  const ur = getCachedRating(id);
  const rc = getCachedCount(id);

  document.getElementById("minner").innerHTML = `
    <div class="mhdr">
      <button class="mclose" onclick="closeModal()">✕</button>
      <div class="bdg-row">
        ${s.isNew?'<span class="bdg bdg-new">NEW</span>':""}
        ${s.worth?'<span class="bdg bdg-w">★行く価値あり</span>':""}
        <span id="openNowBadge"></span>
      </div>
      <div style="font-size:26px;margin-bottom:3px">${s.icon}</div>
      <div class="mtitle">${s.name}</div>
      <div class="msub">
        <span>🏢 ${s.bld} ${s.fl}</span><span>・</span>
        <span>${s.genre}</span><span>・</span>
        <span>${stars(s.rating)} ${s.rating.toFixed(1)}</span>
        ${ur!==null?`<span>・</span><span>👥 ${ur.toFixed(1)}（${rc}件）</span>`:""}
      </div>
    </div>
    <div class="mbody">
      <div class="mdiv"></div>
      <div class="info-grid">
        <div class="info-box"><div class="info-lbl">予算目安</div><div class="info-val">〜¥${s.price.toLocaleString()}</div></div>
        <div class="info-box"><div class="info-lbl">評価</div><div class="info-val" style="font-size:13px">${stars(s.rating)} ${s.rating.toFixed(1)}<div id="gRating" style="font-size:11px;color:var(--text3);margin-top:1px"></div></div></div>
        <div class="info-box"><div class="info-lbl">営業時間</div><div class="info-val" style="font-size:12px">${s.hours}<div id="todayH" style="font-size:11px;color:var(--text3)"></div></div></div>
        <div class="info-box"><div class="info-lbl">定休日</div><div class="info-val" style="font-size:13px">${s.closed}</div></div>
      </div>

      <div class="sec-ttl">おすすめメニュー</div>
      <div class="menu-lst">
        ${s.menu.map(m=>`<div class="menu-row"><span class="menu-nm">${m.n}${m.h?'<span class="hot">人気</span>':""}</span><span class="menu-pr">¥${typeof m.p==="string"?m.p:m.p.toLocaleString()}</span></div>`).join("")}
      </div>

      <div class="sec-ttl">スタッフメモ</div>
      <div class="note-box">💡 ${s.note}</div>

      <div id="aiMenus"></div>

      <div class="sec-ttl">Google マップ</div>
      <div class="map-box loading" id="mapBox">📍 地図を読み込み中...</div>

      <div class="sec-ttl">みんなの口コミ・評価</div>
      <div class="review-form">
        <div class="review-form-title">⭐ 評価を投稿する（全員に共有されます）</div>
        <div class="star-select" id="starSelect">
          ${[1,2,3,4,5].map(n=>`<span class="star-pick" data-n="${n}" onclick="pickStar(${n})">★</span>`).join("")}
        </div>
        <input class="review-name" id="rName" placeholder="名前（空欄で匿名）" maxlength="20">
        <textarea class="review-txt" id="rTxt" placeholder="コメントを入力...（任意・200文字まで）" maxlength="200"></textarea>
        <button class="review-submit" onclick="submitReview()">投稿する</button>
        <div id="rMsg" style="font-size:12px;margin-top:4px"></div>
      </div>

      <div id="reviewsList">
        <div style="font-size:12px;color:var(--text3);padding:4px 0;text-align:center">口コミを読み込み中...</div>
      </div>

      <div class="mdiv"></div>
      <div class="mactions">
        <button class="mbtn" onclick="closeModal()">← 戻る</button>
        <button class="mbtn primary" onclick="window.open('https://www.google.com/maps/search/${encodeURIComponent(s.name+" 大阪駅前"+s.bld)}','_blank')">🗺 大きな地図</button>
      </div>
    </div>`;

  document.getElementById("moverlay").classList.add("open");
  document.body.style.overflow="hidden";

  // GAS連携（口コミ・営業中判定）
  if(GAS_URL) loadGASReviews(s);
}

function closeModal() {
  document.getElementById("moverlay").classList.remove("open");
  document.body.style.overflow="";
  currentShopId=null; pickedRating=0;
}

// 星選択
function pickStar(n) {
  pickedRating = n;
  document.querySelectorAll(".star-pick").forEach((el,i)=>{
    el.classList.toggle("lit", i<n);
  });
}

// レビュー投稿（GASスプレッドシートに保存）
async function submitReview() {
  if(!currentShopId) return;
  const msg = document.getElementById("rMsg");
  if(!pickedRating) { msg.textContent="★ 星を選んでください"; return; }

  const s    = SHOPS.find(x=>x.id===currentShopId);
  const name = (document.getElementById("rName").value.trim())||"匿名";
  const text = document.getElementById("rTxt").value.trim();

  // ボタン無効化・送信中表示
  const btn = document.querySelector(".review-submit");
  btn.disabled = true; btn.textContent = "送信中...";
  msg.style.color="var(--text3)"; msg.textContent="";

  try {
    const result = await postReviewToGAS(currentShopId, s?s.name:"", name, pickedRating, text);
    if(result.success) {
      // キャッシュをクリアして再取得
      delete REVIEW_CACHE[currentShopId];
      msg.style.color="var(--green)";
      msg.textContent="✅ 投稿しました！みんなに共有されます";
      btn.textContent="投稿済み ✅";
      // 口コミリストを即更新
      const data = await fetchUserReviews(currentShopId);
      updateReviewsList(data);
      render(); // カード上の評価も更新
    } else {
      msg.style.color="var(--red)";
      msg.textContent="❌ 投稿に失敗しました。もう一度お試しください";
      btn.disabled = false; btn.textContent="投稿する";
    }
  } catch(e) {
    msg.style.color="var(--red)";
    msg.textContent="❌ 通信エラー。Wi-Fiを確認してください";
    btn.disabled = false; btn.textContent="投稿する";
  }
}

// 口コミリストのHTML更新
function updateReviewsList(data) {
  const el = document.getElementById("reviewsList");
  if(!el) return;
  if(!data.reviews || !data.reviews.length) {
    el.innerHTML='<div style="font-size:12px;color:var(--text3);padding:4px 0">まだ口コミがありません。最初の投稿者になりましょう！</div>';
    return;
  }
  el.innerHTML = data.reviews.map(r=>`
    <div class="review-item">
      <div class="review-item-hdr">
        <span class="review-author">${r.name||"匿名"}</span>
        <div style="display:flex;align-items:center;gap:6px">
          <span class="review-stars">${"★".repeat(Math.min(5,r.rating||0))}</span>
          <span class="review-date">${r.date||""}</span>
        </div>
      </div>
      ${r.comment?`<div class="review-body">${r.comment}</div>`:""}
    </div>`).join("");
}

// GAS連携（Googleマップ情報 + ユーザー口コミ）
async function loadGASReviews(shop) {
  // ① マップを遅延読み込み（モーダルが開いてから500ms後）
  setTimeout(() => {
    const box = document.getElementById("mapBox");
    if (box && box.classList.contains("loading")) {
      box.classList.remove("loading");
      box.innerHTML = `<iframe src="https://www.google.com/maps/embed/v1/search?key=${MAPS_KEY}&q=${encodeURIComponent(shop.name+" 大阪市北区梅田 大阪駅前"+shop.bld)}&language=ja&region=JP" allowfullscreen loading="lazy"></iframe>`;
    }
  }, 500);

  // ② ユーザー口コミをGASから取得して表示
  fetchUserReviews(shop.id).then(data=>{
    if(data.avg && data.count) {
      const msub = document.querySelector(".msub");
      if(msub && !document.getElementById("userRatingBadge")) {
        const span = document.createElement("span");
        span.id="userRatingBadge";
        span.innerHTML=`<span>・</span><span>👥 ${data.avg.toFixed(1)}（${data.count}件）</span>`;
        msub.appendChild(span);
      }
    }
    updateReviewsList(data);
    render();
  });

  // ③ Google Places情報を取得
  if(!GAS_URL) return;
  try {
    const res = await fetch(`${GAS_URL}?action=getReviews&name=${encodeURIComponent(shop.name)}&building=${encodeURIComponent(shop.bld)}`);
    const data = await res.json();
    if(data.googleRating) {
      const el = document.getElementById("gRating");
      if(el) el.textContent = `Google: ${data.googleRating.toFixed(1)}（${data.reviewCount}件）`;
    }
    if(data.isOpenNow!=null) {
      const el = document.getElementById("openNowBadge");
      if(el) {
        const now = new Date(); const mins = now.getHours()*60+now.getMinutes();
        const isLunchTime = mins >= 11*60 && mins <= 15*60+30;
        const isOpen = data.isOpenNow || isLunchTime;
        el.innerHTML = isOpen
          ? '<span class="bdg" style="background:var(--green-bg);color:var(--green)">● 営業中</span>'
          : '<span class="bdg" style="background:var(--red-bg);color:var(--red)">● 本日閉店</span>';
      }
    }
    if(data.todayHours) {
      const el = document.getElementById("todayH");
      if(el) el.textContent = "本日: "+data.todayHours;
    }
    if(data.aiMenus && data.aiMenus.length) {
      const el = document.getElementById("aiMenus");
      if(el) el.innerHTML = `<div class="sec-ttl" style="margin-top:10px">🤖 口コミから抽出したメニュー</div><div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px">${data.aiMenus.map(m=>`<span style="background:var(--red-bg);color:var(--red);font-size:12px;padding:3px 9px;border-radius:10px">${m}</span>`).join("")}</div>`;
    }
    // 写真があればマップの上に差し替え
    if(data.photoUrl) {
      const box = document.getElementById("mapBox");
      if(box) {
        box.classList.remove("loading");
        box.innerHTML = `<img src="${data.photoUrl}" style="width:100%;height:100%;object-fit:cover" onerror="this.style.display='none'">`;
      }
    }
  } catch(e) {}
}

// GASから店舗データ同期 + ニュース取得
async function syncFromGAS() {
  if(!GAS_URL) return;

  // ① ニュースをGASから取得してティッカーを更新
  try {
    const newsRes  = await fetch(`${GAS_URL}?action=getNews`);
    const newsData = await newsRes.json();
    if(newsData.news && newsData.news.length > 0) {
      const items = newsData.news.map(n =>
        `🆕 ${n.date} ${n.building}${n.floor}「${n.name}」${n.note ? "（"+n.note+"）" : ""}`
      );
      // 既存NEWSと合体
      const allNews = [...items, ...NEWS];
      document.getElementById("newsTxt").textContent = allNews.join("　　　／　　　");
    }
  } catch(e) {}

  // ② 店舗データをGASから同期（内蔵より多い場合のみ反映）
  try {
    document.getElementById("syncBadge").textContent="📡 同期中...";
    const res  = await fetch(`${GAS_URL}?action=getShops`);
    const data = await res.json();

    if(data.shops && data.shops.length > SHOPS.length) {
      // GASの新規追加分だけ内蔵データに追加（重複除外）
      const existingIds = new Set(SHOPS.map(s=>s.id));
      const newFromGAS  = data.shops.filter(s => !existingIds.has(s.id) && s.lunch !== false);

      if(newFromGAS.length > 0) {
        // GAS新店を内蔵データに追加して再描画
        newFromGAS.forEach(s => SHOPS.push(s));
        updateStats(SHOPS);
        render();
        document.getElementById("syncBadge").textContent =
          `✅ ${newFromGAS.length}件の新店を追加`;
        setTimeout(() => {
          document.getElementById("syncBadge").textContent =
            `✅ ${new Date(data.updatedAt).toLocaleDateString("ja-JP")}更新`;
        }, 3000);
      } else {
        document.getElementById("syncBadge").textContent = "✅ 最新データ";
      }
    } else {
      document.getElementById("syncBadge").textContent = "✅ 最新データ";
    }
  } catch(e) {
    document.getElementById("syncBadge").textContent = "📋 内蔵データ";
  }
}
syncFromGAS();
</script>
